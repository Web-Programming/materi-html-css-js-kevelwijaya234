<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Storage</title>
  </head>
  <body>
    <h1 id="demo"></h1>
    <script>
      localStorage.setItem("nama", "Kevel"); //test comment
      document.getElementById("demo").innerHTML = localStorage.getItem("nama");

      sessionStorage.setItem("name", "Kevel"); //test comment
      document.getElementById("demo").innerHTML = sessionStorage.getItem("name");

      //lihat perbedaan cara kerja keduanya dengan memberi tanda komentar pada saat item
      //dan membuka tutup browser

      //cookie
      document.cookie = "username = Kevel Cookie";
    </script>
  </body>
</html>
